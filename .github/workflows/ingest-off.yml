name: Ingest OFF

on:
  schedule:
    - cron: "15 3 * * *" # natligt, 03:15 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: "Omfang"
        type: choice
        options: [denmark, nordic, full]
        default: nordic

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Kør kun når secret'et er sat (manuelt trin — se docs/data.md)
    if: ${{ vars.INGEST_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Ingest
        env:
          INGEST_DATABASE_URL: ${{ secrets.INGEST_DATABASE_URL }}
        run: |
          SCOPE="${{ github.event.inputs.scope || 'nordic' }}"
          case "$SCOPE" in
            nordic) FLAG="--nordic" ;;
            full)   FLAG="--full" ;;
            *)      FLAG="" ;;
          esac
          pnpm --filter @madro/scripts ingest:off -- $FLAG
