# Native byg (fase 5.3) — manuel start: GitHub → Actions → "Native" →
# "Run workflow". Ingen automatiske kørsler (macOS-minutter koster 10×).
#
# android: debug-APK som artefakt — kan sideloades direkte på en enhed.
# ios: usigneret kompileringsbevis (kræver ingen Apple-konto).
# testflight: slået fra bag repo-var APPLE_READY='true' + secrets — se
#   docs/native.md for præcis aktiveringsopskrift.

name: Native

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Byg web
        run: pnpm build

      - name: Cap sync android
        working-directory: native
        run: npx cap sync android

      - name: Gradle assembleDebug
        working-directory: native/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: madro-debug-apk
          path: native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Byg web
        run: pnpm build

      - name: Cap sync ios (inkl. pod install)
        working-directory: native
        run: npx cap sync ios

      - name: Xcode-byg uden signering (kompileringsbevis)
        working-directory: native/ios/App
        run: >
          xcodebuild -workspace App.xcworkspace -scheme App
          -configuration Release -destination 'generic/platform=iOS'
          CODE_SIGNING_ALLOWED=NO build

  # ---- TestFlight (aktiveres i din testperiode — se docs/native.md) ----
  # Kræver: repo-var APPLE_READY='true' + secrets:
  #   APPSTORE_ISSUER_ID, APPSTORE_KEY_ID, APPSTORE_P8 (App Store Connect
  #   API-nøgle) og BUILD_CERTIFICATE_BASE64/P12_PASSWORD +
  #   PROVISION_PROFILE_BASE64 (distribution-cert + profil).
  testflight:
    runs-on: macos-15
    if: ${{ vars.APPLE_READY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Byg web
        run: pnpm build

      - name: Cap sync ios
        working-directory: native
        run: npx cap sync ios

      - name: Importér signeringscertifikat
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Installér provisioning-profil
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/madro.mobileprovision

      - name: Arkivér
        working-directory: native/ios/App
        run: >
          xcodebuild -workspace App.xcworkspace -scheme App
          -configuration Release -destination 'generic/platform=iOS'
          -archivePath build/App.xcarchive archive

      - name: Eksportér IPA
        working-directory: native/ios/App
        run: >
          xcodebuild -exportArchive -archivePath build/App.xcarchive
          -exportPath build -exportOptionsPlist ExportOptions.plist

      - name: Upload til TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: native/ios/App/build/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_P8 }}
